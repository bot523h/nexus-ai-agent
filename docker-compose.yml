version: '3.8'

services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
  
  dashboard:
    build: .
    command: uvicorn nexus_ai_agent.api.app:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    restart: unless-stopped
